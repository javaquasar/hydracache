[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "hydracache-client"
version = "0.49.0"
description = "Python SDK contract package for the HydraCache external client protocol."
requires-python = ">=3.10"
readme = "README.md"
license = "Apache-2.0"
authors = [{ name = "HydraCache Contributors" }]
keywords = ["cache", "hydracache", "client", "conformance"]

[project.urls]
Homepage = "https://github.com/javaquasar/hydracache"
Repository = "https://github.com/javaquasar/hydracache"

[project.scripts]
hydracache-conformance = "hydracache_client.conformance:main"

[tool.hydracache]
protocol-version = 1
conformance-manifest = "../../crates/hydracache-client/tests/fixtures/conformance/client_v1.json"

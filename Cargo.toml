[workspace]
members = [
    "crates/hydracache",
    "crates/hydracache-core",
]
resolver = "2"

[workspace.package]
version = "0.2.0"
edition = "2021"
rust-version = "1.78"
license = "Apache-2.0"
authors = ["HydraCache Contributors"]
repository = "https://github.com/javaquasar/hydracache"
homepage = "https://github.com/javaquasar/hydracache"
readme = "README.md"
keywords = ["cache", "caching", "async", "runtime"]
categories = ["caching", "asynchronous"]

[workspace.dependencies]
async-trait = "0.1"
bytes = "1"
futures-util = "0.3"
hydracache-core = { path = "crates/hydracache-core", version = "0.2.0" }
moka = { version = "0.12", features = ["future"] }
postcard = { version = "1", features = ["alloc"] }
serde = { version = "1", features = ["derive"] }
thiserror = "1"
tokio = { version = "1", features = ["macros", "rt-multi-thread", "sync", "time"] }

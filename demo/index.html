<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HydraCache Cluster Simulator</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell" data-testid="demo-shell">
      <header class="topbar glass-panel">
        <div>
          <h1>HydraCache Cluster Simulator</h1>
          <p id="engine-banner" data-testid="engine-banner">
            This runs the real hydracache-sim engine. Verdicts are produced by the actual invariant checker.
          </p>
        </div>
        <div id="verdict" class="verdict" data-testid="verdict">loading</div>
      </header>

      <section class="controls glass-panel" aria-label="simulation controls">
        <label>
          Seed
          <input id="seed-input" data-testid="seed-input" inputmode="numeric" value="80" />
        </label>
        <label>
          Scenario
          <select id="scenario-select" data-testid="scenario-select"></select>
        </label>
        <label>
          Mode
          <select id="mode-select" data-testid="mode-select">
            <option value="manual">Manual</option>
            <option value="scripted">Scripted</option>
            <option value="mixed">Mixed</option>
          </select>
        </label>
        <p id="intervention-status" class="copy-status" data-testid="intervention-status"></p>
        <button id="load-scenario" type="button" data-testid="load-scenario">Load</button>
        <button id="reset-button" type="button" data-testid="reset">Reset</button>
        <button id="step-button" type="button" data-testid="step">Step</button>
        <button id="play-button" type="button" data-testid="play">Play</button>
        <button id="copy-reproducer" type="button" data-testid="copy-reproducer">
          Copy reproducer
        </button>
        <p id="copy-status" class="copy-status" data-testid="copy-status"></p>
        <label class="toggle">
          <input id="workload-toggle" type="checkbox" checked data-testid="workload-toggle" />
          Workload
        </label>
        <label class="range">
          Speed
          <input id="speed-input" type="range" min="80" max="1200" step="40" value="360" />
        </label>
      </section>

      <section class="workspace">
        <section class="graph-panel glass-panel" aria-label="cluster graph">
          <svg id="cluster-graph" viewBox="0 0 800 520" role="img" aria-label="cluster graph"></svg>
          <div class="graph-legend" data-testid="graph-legend" aria-label="signal legend">
            <span><i class="legend-dot vote"></i>vote</span>
            <span><i class="legend-dot heartbeat"></i>heartbeat</span>
            <span><i class="legend-dot data"></i>data</span>
            <span><i class="legend-dot event"></i>event</span>
          </div>
        </section>

        <aside class="side-panel glass-panel">
          <section class="glass-panel">
            <h2>Link</h2>
            <p id="selected-link" data-testid="selected-link">none</p>
            <div class="button-row">
              <button id="partition-link" type="button" data-action="partition" data-testid="partition-link">
                Partition
              </button>
              <button id="delay-link" type="button" data-action="delay" data-testid="delay-link">
                Delay
              </button>
              <button id="drop-link" type="button" data-action="drop" data-testid="drop-link">
                Drop
              </button>
              <button id="heal-link" type="button" data-action="heal" data-testid="heal-link">
                Heal
              </button>
            </div>
          </section>

          <section class="glass-panel">
            <h2>Progress</h2>
            <dl id="progress-panel" data-testid="progress-panel"></dl>
            <p id="snapshot-hash" class="hash" data-testid="snapshot-hash"></p>
          </section>

          <section class="glass-panel">
            <h2>Nodes</h2>
            <button id="add-node-button" type="button" data-testid="add-node-button">
              Add node
            </button>
            <div id="nodes-panel" data-testid="nodes-panel"></div>
          </section>

          <section class="glass-panel">
            <h2>Signals</h2>
            <div id="signals-panel" data-testid="signals-panel"></div>
          </section>

          <section class="glass-panel">
            <h2>Client</h2>
            <div class="manual-controls">
              <label>
                Namespace
                <input id="manual-ns" value="profiles" data-testid="manual-ns" />
              </label>
              <label>
                Key
                <input id="manual-key" value="profile-42" data-testid="manual-key" />
              </label>
              <label>
                Value
                <input id="manual-value" value="fresh" data-testid="manual-value" />
              </label>
              <div class="button-row">
                <button id="subscribe-button" type="button" data-testid="subscribe-button">
                  Subscribe
                </button>
                <button id="push-event-button" type="button" data-testid="push-event-button">
                  Push
                </button>
              </div>
            </div>
            <div id="clients-panel" data-testid="clients-panel"></div>
            <div id="subscribers-panel" data-testid="subscribers-panel"></div>
          </section>

          <section class="glass-panel">
            <h2>Consistency</h2>
            <div id="consistency-panel" data-testid="consistency-panel"></div>
          </section>

          <section class="glass-panel">
            <h2>Keys</h2>
            <div id="keys-panel" data-testid="keys-panel"></div>
          </section>
        </aside>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>

apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: hydracacheclusters.hydracache.io
spec:
  group: hydracache.io
  names:
    kind: HydraCacheCluster
    listKind: HydraCacheClusterList
    plural: hydracacheclusters
    shortNames:
      - hcc
    singular: hydracachecluster
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Leader
          type: string
          jsonPath: .status.leader
      subresources:
        status: {}
        scale:
          specReplicasPath: .spec.replicas
          statusReplicasPath: .status.observedReplicas
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [image, version, replicas, regions]
              properties:
                image:
                  type: string
                  minLength: 1
                version:
                  type: string
                  minLength: 1
                replicas:
                  type: integer
                  format: int32
                  minimum: 1
                regions:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [region, zone]
                    properties:
                      region:
                        type: string
                        minLength: 1
                      zone:
                        type: string
                        minLength: 1
                persistence:
                  type: object
                  required: [storageClassName, size]
                  properties:
                    storageClassName:
                      type: string
                      minLength: 1
                    size:
                      type: string
                      minLength: 1
                    reclaimPolicy:
                      type: string
                      enum: [Retain, Delete]
                      default: Retain
                tls:
                  type: object
                  required: [secretName]
                  properties:
                    secretName:
                      type: string
                      minLength: 1
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                backupSchedule:
                  type: object
                  required: [schedule, location, retention]
                  properties:
                    schedule:
                      type: string
                      minLength: 1
                    location:
                      type: string
                      minLength: 1
                    retention:
                      type: string
                      minLength: 1
            status:
              type: object
              properties:
                observedReplicas:
                  type: integer
                  format: int32
                leader:
                  type: string
                health:
                  type: string
                  enum: [Healthy, Degraded, Forming]
                phase:
                  type: string
                  enum: [Ready, Scaling, Upgrading, Rebalancing]
                lastBackup:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true

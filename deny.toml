[advisories]
ignore = [
    { id = "RUSTSEC-2024-0437", reason = "raft 0.7.0 depends on protobuf 2.x unconditionally; prost-codec requires protoc and breaks source-only builds. Tracked in docs/technical-debt/TD-0002-raft-protobuf-advisory.md." },
    { id = "RUSTSEC-2023-0089", reason = "Transitive postcard/heapless warning; not directly used for atomics by HydraCache. Tracked in docs/technical-debt/TD-0002-raft-protobuf-advisory.md." },
    { id = "RUSTSEC-2025-0057", reason = "Transitive raft 0.7.0 warning. Tracked in docs/technical-debt/TD-0002-raft-protobuf-advisory.md." },
    { id = "RUSTSEC-2026-0173", reason = "Transitive raft 0.7.0 warning. Tracked in docs/technical-debt/TD-0002-raft-protobuf-advisory.md." },
]

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
workspace-default-features = "allow"
external-default-features = "allow"

[[bans.deny]]
name = "sqlparser"
wrappers = []
reason = "SQL parsing is allowed only in future lint/dev tooling; it must not enter HydraCache runtime crates."

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

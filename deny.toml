[advisories]
ignore = [
    { id = "RUSTSEC-2024-0437", reason = "2026-07-04 re-check: crates.io still publishes raft 0.7.0 as latest; it depends on protobuf 2.x through protobuf-codec, while prost-codec requires protoc and breaks source-only builds. Tracked in docs/technical-debt/TD-0002-raft-protobuf-advisory.md." },
    { id = "RUSTSEC-2023-0089", reason = "2026-07-04 re-check: atomic-polyfill remains in the target-all graph through postcard 1.1.3 -> heapless 0.7.17 and is not directly used for atomics by HydraCache. Tracked in docs/technical-debt/TD-0002-raft-protobuf-advisory.md." },
    { id = "RUSTSEC-2024-0384", reason = "2026-07-04 re-check: instant 0.1.13 remains through sled 0.34.7 -> parking_lot 0.11.2; sled 1.0-alpha is TD-0003 bucket C and out of scope for 0.57.1. Tracked in docs/technical-debt/TD-0002-raft-protobuf-advisory.md." },
    { id = "RUSTSEC-2025-0057", reason = "2026-07-04 re-check: fxhash 0.2.1 remains through raft 0.7.0 and sled 0.34.7; both upgrades are upstream/migration-bound for 0.57.1. Tracked in docs/technical-debt/TD-0002-raft-protobuf-advisory.md." },
    { id = "RUSTSEC-2026-0173", reason = "2026-07-04 re-check: proc-macro-error2 2.0.1 remains through sea-orm 1.1.20 -> sea-bae 0.2.1; sea-orm 2.0 is TD-0003 bucket C and out of scope for 0.57.1. Tracked in docs/technical-debt/TD-0002-raft-protobuf-advisory.md." },
]

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"
workspace-default-features = "allow"
external-default-features = "allow"

[[bans.deny]]
name = "sqlparser"
wrappers = ["hydracache-sql-lint"]
reason = "SQL parsing is allowed only through the HydraCache CI/build-time lint crate; it must not enter runtime crates."

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

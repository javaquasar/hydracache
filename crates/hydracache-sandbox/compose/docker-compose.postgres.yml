name: hydracache-sandbox

services:
  postgres:
    image: postgres:16-alpine
    container_name: hydracache-sandbox-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hydracache
      POSTGRES_USER: hydracache
      POSTGRES_PASSWORD: hydracache
    ports:
      - "${HYDRACACHE_SANDBOX_POSTGRES_PORT:-54329}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydracache -d hydracache"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

name: hydracache-sandbox-full

services:
  postgres:
    image: postgres:16-alpine
    container_name: hydracache-sandbox-full-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hydracache
      POSTGRES_USER: hydracache
      POSTGRES_PASSWORD: hydracache
    ports:
      - "${HYDRACACHE_SANDBOX_POSTGRES_PORT:-54329}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydracache -d hydracache"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  sandbox:
    build:
      context: ../../..
      dockerfile: crates/hydracache-sandbox/compose/Dockerfile.sandbox
    image: hydracache-sandbox:local
    container_name: hydracache-sandbox-api
    command: ["--profile", "postgres-compose", "--bind", "0.0.0.0:3000"]
    environment:
      HYDRACACHE_SANDBOX_PROFILE: postgres-compose
      HYDRACACHE_SANDBOX_BIND: 0.0.0.0:3000
      HYDRACACHE_SANDBOX_DATABASE_URL: postgres://hydracache:hydracache@postgres:5432/hydracache
    ports:
      - "${HYDRACACHE_SANDBOX_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:3000/ready >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 20
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:

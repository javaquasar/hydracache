status = "shipped"
networked_control_plane = true
theme = "Cluster Elasticity Completion & Quality — finish the named residuals so the ledger reaches 1.0 with only permanent TDs open: close the TD-0011 late-start join bootstrap, enable the TD-0009 coverage ratchet, and implement/narrow the 0.58 W4 kind chaos injector. W1 late-start daemon join: explicit cluster_start = bootstrap|join config (default bootstrap, R-10; restart precedence — a non-empty durable raft log overrides the mode), configurable join_timeout_ms, advertised cluster endpoint when bind address is not routable, fallible RaftMetadataRuntimeConfig::try_joining that does NOT chain self into the voter set (today normalize_voters always does, lib.rs:203-215, so a 4th daemon fabricates a divergent 4-voter ConfState), pre-cache gossip candidate announce with endpoint KV to break the admission deadlock (today announce happens only inside HydraCache::member().start() AFTER wait_for_raft_leader — the leader can never learn the joiner exists), conservative gossip-candidate address fold-in to refresh_raft_peers so followers can route to the joiner (the replicated MemberUpsert carries no endpoints, control_plane.rs:73-79; addresses are dissemination hints per R-1 — extending the durable command is explicitly rejected), wait_for_join_complete (leader known AND self in voter_ids, fail loud and never self-bootstrap) and a lazier joiner election tick; leader-side promotion via the shipped 0.60 sync_raft_voters is reused unchanged. E2E: fourth daemon joins as a COUNTED voter (proven by surviving a subsequent member kill), unreachable-cluster joiner fails loud, drained joiner leaves the voter set. W2 operator scale claim (kind): status.bootstrap_replicas recorded and preserved once, deterministic pod identity, routable advertised cluster endpoints (no 0.0.0.0 raft peers), HOSTNAME/ordinal-aware start mode in the single StatefulSet template, seeds derived from the bootstrap/live cohort rather than the post-scale desired count, replicas 3->4->3 moves raft voters 3->4->3 through deployed daemons, pod crash does not shrink voters (falsifiable contrast). W3 kind chaos injector: NetworkPartition via NetworkPolicy with a CNI-enforcement probe that skips loud on kindnet (never wrong-but-green); SlowDisk via chaos-mesh IOChaos only when its CRD is present, otherwise the residual is narrowed and SCOPE_DISCLOSURE says so. W4 TD-0009 closure: targeted fast tests (operator controller, NATS/Redis transports, server config, sqlx_outbox, vopr CLI), thin-binary policy, then a scheduled-CI cargo llvm-cov --fail-under-lines ratchet at max(88, floor(post-W4 clean line baseline)); current post-0.60 baseline: 87.77% lines, 2026-07-06; mechanical floor, not a self-score, R-7; not in the fast verify gate. W5 runbook (grow/shrink walkthroughs) + TD-0011/TD-0009 closure only when their gates are actually green. Completion over shipped mechanics: no joint consensus/learner stage, no log compaction/snapshot catch-up (named boundaries), no autoscaling policy, fast path unchanged (R-10), no new consensus (R-1)"

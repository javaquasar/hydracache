# HydraCache release manifest — the authoritative release order, status, and
# dependencies. Mirrored for humans in docs/plans/INDEX.md.
#
# Validated by `cargo xtask doc-check`:
#   - every `file` must exist on disk;
#   - no two non-draft/non-superseded entries may share a `version`;
#   - every `depends_on` entry must reference a `version` present here;
#   - `status` must be one of: shipped | in-progress | planned | draft | superseded;
#   - `version` may be "TBD" only for draft/superseded entries.
#   - shipped 0.43.0 must explicitly set `networked_control_plane = true` so
#     modeled-vs-networked control-plane drift cannot be silently marked shipped.
#
# Keep this file in sync when a release changes status or a plan is added/renamed.


ialized release-blocking 0.64 lane, and each subpart has its own contract receipt and negative canary. A Raft-focused reference closure (W29-W39) adds leadership handoff plus session-guarantee safety, snapshot-delivery fan-out and handoff composition, durable recovery corpus, reproducible v0.63 compatibility fixtures, mechanical gated-proof governance, cache expiry-storm and adapter/config/resource matrices, and an independent pinned TLA+/TLC lane. W29-W39 are organized into core and specialized ship tiers by execution cost, but every row remains release-blocking unless an explicit scope-change commit updates the plan, manifest, INDEX, and claim. Test-first, feature-light; no Redis/Hazelcast protocol, ownership-routing, or new consensus scope; narrow production fixes only if a new test exposes a real bug; daemon-process compaction remains a future seam (0.66)."

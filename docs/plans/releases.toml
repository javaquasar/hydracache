status = "planned"
networked_control_plane = true
theme = "Performance Characterization & Capacity Baselines - a measurement-only release answering, with recorded artifacts, how much load the embedded cache, a bare daemon, and the cluster actually hold at a declared SLO. Today the repo has criterion micro-benches + bench-budget (0.37) and endurance/overload correctness (0.58) but zero capacity characterization: no open-loop load generator, no coordinated-omission handling, no saturation knee, no scaling/consistency-cost/brownout numbers. W0 builds the instrument: fixed-rate open-loop driver where a missed tick counts as latency (wrk2/HdrHistogram, Gil Tene), stepped-rate knee search (capacity = throughput at p99<=SLO, not peak), PERF_REPORT schema with hardware profile/commit/seed/spread, and the load-bearing canary proving a closed-loop recorder hides a stall the open-loop one reports. W1 local cache tier (Caffeine JMH blueprint): 1..N thread scaling curves per read/write mix, hot-key contention floor, eviction-pressure and allocation-per-op profiles. W2 bare node over the native protocol (YCSB A/B/C mixes): knee at SLO, connection-count scaling 1..1000, payload sweep to value limits, admission rejection overhead. W3 bare node over RESP using real redis-benchmark/memtier against the 0.63 facade (ecosystem tooling runs unmodified - an interop proof), pipeline sweep, native-vs-RESP overhead ratio; closed-loop tooling recorded as throughput evidence only, never conflated with open-loop tail-latency claims. W4 cluster tier: knee at 3/5/7 daemons with scaling-efficiency (USL fit, no extrapolated claims), consistency-level cost matrix incl. session/RYOW, replication write amplification, invalidation-fanout cost. W5 operational brownout profiles - measured depth + recovery time for leader failover, membership add/drain, rebalance, kill/rejoin (0.62/0.66 prove correctness; W5 measures the cost). W6 overload goodput/recovery curves at 1.2x/1.5x/2x knee with an admission-bypass canary proving the curve reflects the mechanism. W7 macro perf budgets keyed by hardware profile + xtask perf-budget-check (floor breach, unstable spread, and silent rebaseline all fail - 0.37 bench-budget extended to the macro tier). W8 same-box comparative baseline vs pinned real Redis via redis-benchmark, methodology attached, artifact not marketing (R-7). W9 metrics honesty: server-reported ops/latency/rejects cross-checked against the independent open-loop observer, undercount canary caught. W10 governance: release-evidence/0.67 receipts + require-ship gate, registry/canary rows, Performance Nightly CI lane with uploaded PERF_REPORT artifacts, docs/PERFORMANCE.md methodology. Measurement only: no optimization work, no product surface, loadgen crate never in a release graph; narrow fixes only when a measurement exposes a real defect, each with its own regression measurement."
depends_on = ["0.66.0"]


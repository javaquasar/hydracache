cal sentinels. W6 records COMPAT/GATES/TESTING/docs, executable examples, config/operator defaults, TLS/auth rollout posture, node-local deployment posture, and rollout/rollback playbook. Not a Redis clone; no MOVED/ASK/Cluster, cross-endpoint Redis key visibility, multi-endpoint Redis lock mutual exclusion, Redlock quorum, Redisson full-lock claim, or general Lua runtime; core stays untouched while protocol v3 is registered for TTL support and protocol v4 for Redis lock conditionals."

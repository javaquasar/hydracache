depends_on = ["0.50.0", "0.52.0"]

[[release]]
version = "0.53.1"
file = "docs/plans/V0_53_1_REAL_RAFT_ELECTION_IN_THE_LAB_PLAN.md"
status = "shipped"
theme = "Real raft election in the lab (point release over 0.53) — raise leader election from the modeled sim-model FSM to real raft-rs consensus driven deterministically over the simulator's seeded, fault-injecting SimNetwork (executing the 0.53 W1b 'first attempt'). Reuses the shipped hydracache-cluster-raft RaftMetadataRuntime + RaftWireMessage + RaftMessageSink (no new consensus); the one seam is seeding raft-rs's randomized election timeout via set_randomized_election_timeout, gated by election_determinism_holds_over_1000_seeds. Validates the sim-model against real raft, surfaces election_source:'raft' (default on the native server/sandbox path), resolves wasm-compat via an ADR (raft-in-wasm or server=raft/wasm=validated-model), and discloses the source in the UI. Lab stays a teaching asset, product runtime untouched"
depends_on = ["0.53.0"]

[[release]]
version = "0.54.0"
file = "docs/plans/V0_54_EXTERNAL_INVALIDATION_TRANSPORTS_PLAN.md"
status = "shipped"
theme = "External invalidation transports — async InvalidationTransport relay over the existing tokio-broadcast bus + CacheInvalidationFrame + 0.46 ring, plus opt-in crate-per-backend (Redis then NATS) relaying near-cache freshness between processes of one cluster. Correctness = version/generation FENCING (falsifiable, no resurrection under reorder); message_id dedup is an efficiency optimisation; ANTI-STORM rule (inbound applies locally, never re-published); resume via ring.replay_from with FellBehind->clear-partition; publish never blocks the cache fast path (R-10); bounded queues + per-source rate-limit for over-invalidation; bounded-label metrics; loud on unknown/malformed frames. Not an event log (R-9), no new consistency level (R-1), cross-cluster/WAN out of scope. Blueprint: arroyo connector-as-module pattern"
depends_on = ["0.46.0"]

[[release]]
version = "0.55.0"
file = "docs/plans/V0_55_DURABLE_STORE_HARDENING_PLAN.md"
status = "shipped"
theme = "Durable store hardening & cluster-wide checkpoints — harden the shipped 0.51 sled-backed durable value plane: EXTEND the existing ReplicatedValueStore trait (hardening.rs:367, already impl by sled DurableValueStore + InMemoryReplicatedValueStore; NOT a new trait) with scan_all/remove/compact (no behaviour change; keeps redb/RocksDB drop-in per TD-0003; trait stays generic-bound, not object-safe), domain-aware inspect/dump tool + bounded background scrubber (per-record independent decode, proactive corruption detection, fail-loud), maintenance (repair-gated tombstone GC that never resurrects + sled compaction + budget hardening), barrier-aligned cluster-wide consistent checkpoint + rescale-with-checkpoint (arroyo pattern, loses no committed write), and a per-key poison-load circuit-breaker over the single-flight loader (blazingmq poison-pill analog). Honest sled reframing of the blazingmq file-store idea (sled owns files). No new consistency level (R-1), not a database (R-9), RAM-only default unchanged (R-10); validated by 0.44 DST. Promoted from V0_DRAFT_DURABLE_STORE_HARDENING_PLAN"
depends_on = ["0.51.0"]


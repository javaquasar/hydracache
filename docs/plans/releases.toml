al, honest reshard_phase labeling; W7 E2E extensions (no-lost-committed-metadata, follower drain, leader drain/re-election, drain-shrinks-quorum) + nightly CI tier for the networked E2E + TD-0009 coverage baseline re-measure (no ratchet gate); W8 runbook/gates/TD update. Hardening over shipped consensus, NOT a new algorithm (R-1); local/client stay modeled; loopback dev unchanged (R-10); prerequisite work toward the 1.0 'production-ready cluster out of the box' claim"

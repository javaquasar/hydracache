schema_version = 1
release = "0.67.0"
name = "ci-shared"
enforcement = "non_enforcing_tripwire"
bootstrap_status = "unbootstrapped"
required_platform_key = "linux-x86_64"

[runner]
name = "ci-shared"
required_runner_class = "github-hosted-linux-x64"
allowed_fingerprints = []
minimum_logical_cores = 2
required_cpu_affinity = "runner-managed"
required_cgroup_cpu_quota = "runner-managed"
require_dedicated = false
maximum_calibration_score = 0.25

[noise]
absolute_numbers_are_ship_evidence = false
comparison_class = "rolling-same-shared-runner-class"
maximum_report_spread_ratio = 0.30

[prebuild]
schema_version = 1
toolchain_identity = "rustc-1.94.0"
target_set = ["hydracache-loadgen", "hydracache-server"]
features = []
cargo_profile = "release"
flags = ["--locked", "--release"]
build_recipe = ["cargo build -p hydracache-loadgen -p hydracache-server --release --locked"]

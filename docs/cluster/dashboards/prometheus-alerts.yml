groups:
  - name: hydracache-grid
    rules:
      - alert: HydraCacheRepairDebt
        expr: hydracache_tombstone_repair_debt > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: HydraCache repair debt is accumulating.
      - alert: HydraCacheReplicationLag
        expr: hydracache_replication_lag > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: HydraCache replication lag is non-zero.
      - alert: HydraCacheSplitBrainDetected
        expr: hydracache_split_brain_detected_total > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: HydraCache detected split-brain and ran merge policy.
      - alert: HydraCacheAuthRejected
        expr: hydracache_cluster_auth_rejected_total > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: HydraCache rejected cluster-route authentication or authorization.
      - alert: HydraCacheRepairDebtDegradedMode
        expr: hydracache_repair_debt_degraded_mode > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: HydraCache entered repair-debt degraded mode.
      - alert: HydraCachePlacementZoneUnderspread
        expr: hydracache_placement_zone_underspread > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: HydraCache placement cannot satisfy requested zone spread.
      - alert: HydraCacheReshardBackfillLag
        expr: hydracache_reshard_backfill_lag > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: HydraCache online resharding backfill lag is non-zero.
      - alert: HydraCacheInvalidationSagaPending
        expr: hydracache_invalidation_saga_pending > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: HydraCache invalidation saga fan-out is still pending.
      - alert: HydraCacheAutoRepairActive
        expr: hydracache_auto_repair_active_total > 0
        for: 1m
        labels:
          severity: info
        annotations:
          summary: HydraCache auto-repair scheduled active repair work.

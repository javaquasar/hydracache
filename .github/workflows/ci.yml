name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

env:
  CARGO_BUILD_JOBS: 2
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace --all-targets --locked

      - name: Check benchmark targets
        run: |
          cargo check -p hydracache --benches --locked
          cargo check -p hydracache-db --benches --locked

      - name: Dependency bans
        run: cargo deny check bans

      - name: Docs consistency
        run: |
          cargo test -p xtask --test doc_check --locked
          cargo run -p xtask --locked -- doc-check

      - name: Release feature leak
        run: cargo run -p xtask --locked -- verify-no-test-features

      - name: SQL lint baseline drift
        run: |
          cargo test -p hydracache-sql-lint --test lint_cli --locked
          cargo run -p hydracache-sql-lint --bin lint --locked -- --check-baseline --baseline lint-baseline.json

      - name: Performance budget contract
        run: |
          cargo test -p xtask --test bench_budget --locked
          cargo run -p xtask --locked -- bench-budget --current benches/baseline/0_37.json

      - name: DST fast budget
        run: cargo test -p hydracache-sim --test dst_budget --locked

      - name: Soak fast budget
        run: cargo test -p hydracache-sim --test soak_budget --locked

      - name: Raft failpoint crash-safety
        run: cargo test -p hydracache-cluster-raft --features test-failpoints --test failpoints_crash_safety --locked -- --test-threads=1

      - name: Raft snapshot and transport proof
        run: |
          cargo test -p hydracache-cluster-raft snapshot_immutability --locked
          cargo test -p hydracache-cluster-raft --test raft_snapshot_membership --locked
          cargo test -p hydracache-cluster-raft --features test-failpoints snapshot_apply --locked -- --test-threads=1
          cargo test -p hydracache-cluster-raft snapshot_replay_manifest --locked
          cargo test -p hydracache-server grid_host::tests::http_raft_sink_times_out_when_peer_accepts_without_reply --locked
          cargo test -p hydracache-server grid_host::tests::drive_loop_counts_and_reports_send_failures --locked
          cargo test -p hydracache-server grid_host::tests::raft_drive_continues_after_bounded_peer_send_timeout --locked

      - name: Raft nemesis membership fast
        run: cargo test -p hydracache-cluster-raft --test nemesis_membership --locked

      - name: Raft corpus vectors
        run: cargo test -p hydracache-cluster-raft --test raft_corpus_vectors --locked

      - name: Snapshot corruption
        run: cargo test -p hydracache-cluster-raft --features sled-log-store --test snapshot_corruption --locked

      - name: Raft rejoin after compaction
        run: cargo test -p hydracache-cluster-raft --features test-failpoints --test rejoin_after_compaction --locked -- --test-threads=1

      - name: Raft snapshot resource faults
        run: cargo test -p hydracache-cluster-raft --features test-failpoints --test snapshot_resource_faults --locked -- --test-threads=1

      - name: Snapshot exhaustive grid
        run: cargo test -p hydracache-cluster-raft --test snapshot_exhaustive_grid --locked

      - name: Management console
        run: |
          npm --prefix console ci
          npx --prefix console playwright install --with-deps chromium
          npm --prefix console run build
          npm --prefix console test

      - name: Test
        run: cargo test --workspace --locked

      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Clean Rust test scratch links
        if: always()
        run: rm -rf target/tests

  performance-budget:
    name: Performance Budget
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: performance-budget

      - name: Run criterion benchmarks
        run: |
          cargo bench -p hydracache --bench cache_hot_path --locked
          cargo bench -p hydracache-db --bench outbox_write --locked

      - name: Enforce performance budget
        run: cargo run -p xtask --locked -- bench-budget --current target/criterion

  redis-compat-release-proof:
    name: Redis Compatibility Release Proof
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: redis-compat-release-proof

      - name: Check Docker availability
        run: |
          docker version
          docker info

      - name: Redis fast checks
        run: |
          cargo fmt --all -- --check
          cargo test -p xtask --test doc_check redis_compat --locked -- --nocapture
          cargo test -p hydracache-redis-compat --locked
          cargo test -p hydracache-server --test server_lifecycle redis --locked
          cargo clippy -p hydracache-redis-compat --all-targets --locked -- -D warnings

      - name: Redis Docker/client/oracle matrix
        env:
          HYDRACACHE_RUN_REDIS_COMPAT_CLIENTS: "1"
          HYDRACACHE_REQUIRE_REDIS_ORACLE: "1"
          HYDRACACHE_FORCE_REDIS_CLIENT_DOCKER: "1"
          HYDRACACHE_REQUIRE_REDIS_CLIENT_PYTHON: "1"
          HYDRACACHE_REQUIRE_REDIS_CLIENT_NODE: "1"
          HYDRACACHE_REQUIRE_REDIS_CLIENT_GO: "1"
          HYDRACACHE_REQUIRE_REDIS_CLIENT_JVM: "1"
        run: cargo test -p hydracache-redis-compat --test redis_clients --locked -- --ignored --nocapture

      - name: Redis resource smoke
        env:
          HYDRACACHE_RUN_REDIS_COMPAT_RESOURCE_SMOKE: "1"
        run: cargo test -p hydracache-redis-compat --test resp_resource_smoke --locked -- --ignored --nocapture

  dst-nightly-soak:
    name: DST and Soak Nightly
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: dst-nightly-soak

      - name: Run deterministic simulation seeds
        run: |
          cargo run -p hydracache-sim --bin vopr --locked -- --seed 44 --steps 512
          cargo run -p hydracache-sim --bin vopr --locked -- --seed 45 --steps 512
          cargo run -p hydracache-sim --bin vopr --locked -- --seed 46 --steps 512

      - name: Run continuous soak and write SOAK_REPORT
        run: |
          cargo run -p hydracache-sim --bin vopr --locked -- soak --master-seed 22530 --budget-secs 60 --steps-per-seed 512 --max-seeds 128 | tee SOAK_REPORT.json

      - name: Run ignored resource and operator skip sentinels
        run: |
          cargo test -p hydracache-server --test soak_resource --locked -- --ignored --nocapture
          cargo test -p hydracache-operator --test soak_kind --locked -- --ignored --nocapture

      - name: Run networked daemon E2E tier
        env:
          HYDRACACHE_RUN_NETWORKED_DAEMON_E2E: "1"
        run: cargo test -p hydracache-server --test grid_host multi_node --locked -- --nocapture

      - name: Run daemon-process cluster tier
        env:
          HYDRACACHE_RUN_DAEMON_PROCESS_E2E: "1"
        run: cargo test -p hydracache-server --test daemon_process_cluster --locked -- --test-threads=1 --nocapture

      - name: Upload daemon-process replay artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: daemon-process-replay-artifacts
          path: target/test-hydracache-daemon-process/**
          if-no-files-found: ignore

      - name: Run membership-history tier
        env:
          HYDRACACHE_RUN_DAEMON_PROCESS_E2E: "1"
        run: cargo test -p hydracache-server --test membership_history --locked -- --nocapture

      - name: Run pre-vote nightly soak
        env:
          HYDRACACHE_RUN_PREVOTE_NIGHTLY_SOAK: "1"
        run: cargo test -p hydracache-cluster-raft --test prevote_nightly_soak --locked -- --nocapture

      - name: Run raft nemesis nightly soak
        env:
          HYDRACACHE_RUN_RAFT_NEMESIS_SOAK: "1"
          HYDRACACHE_NEMESIS_BUDGET_SECS: "60"
        run: cargo test -p hydracache-cluster-raft --test nemesis_membership nemesis_soak_over_seed_range_converges --locked -- --nocapture

      - name: Upload SOAK_REPORT
        uses: actions/upload-artifact@v6
        with:
          name: SOAK_REPORT
          path: SOAK_REPORT.json

  coverage-ratchet:
    name: Coverage Ratchet
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: coverage-ratchet

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Enforce coverage floor
        run: cargo llvm-cov --workspace --all-targets --locked --summary-only --fail-under-lines 88

      - name: Generate coverage artifacts on failure
        if: failure()
        continue-on-error: true
        run: |
          cargo llvm-cov report --html --output-dir target/llvm-cov-html
          cargo llvm-cov report --lcov --output-path target/llvm-cov.lcov

      - name: Upload coverage artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-ratchet
          path: |
            target/llvm-cov-html
            target/llvm-cov.lcov

      - name: Clean Rust test scratch links
        if: always()
        run: rm -rf target/tests

  msrv:
    name: MSRV 1.88.0
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust 1.88.0
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: msrv-1.88.0

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Check MSRV
        run: cargo check --workspace --all-targets --locked

      - name: Test MSRV
        run: cargo test --workspace --locked

      - name: Clean Rust test scratch links
        if: always()
        run: rm -rf target/tests

name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  pull_request:
  workflow_dispatch:
    inputs:
      run_nightly:
        description: "Run scheduled/nightly proof lanes during manual dispatch"
        required: false
        default: false
        type: boolean
      run_reference_performance:
        description: "Run 0.67 reference evidence on a serialized GitHub-hosted Ubuntu 24.04 VM"
        required: false
        default: false
        type: boolean
      candidate_release:
        description: "Release that owns candidate fast and manually dispatched gate receipts"
        required: false
        default: "0.67"
        type: string
      gated_gate_id:
        description: "Exact gate id from docs/testing/gated-test-registry.toml"
        required: false
        type: string
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

env:
  CARGO_BUILD_JOBS: 2
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  HYDRACACHE_CANDIDATE_RELEASE: ${{ inputs.candidate_release || '0.67' }}

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: 4

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: console/package-lock.json

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2-rust-with-target
          cache-targets: true

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Install pinned cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest@0.9.137

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace --all-targets --locked

      - name: Dependency bans
        run: cargo deny check bans

      - name: Docs consistency
        run: |
          cargo test -p xtask --test doc_check --locked
          cargo run -p xtask --locked -- doc-check

      - name: Raft mutation baseline
        run: |
          cargo test -p xtask --test mutants --locked
          cargo run -p xtask --locked -- mutants

      - name: Canary completeness
        run: |
          cargo test -p xtask --test canary_check --locked
          cargo run -p xtask --locked -- canary-check --release 0.64
          cargo run -p xtask --locked -- canary-sweep --release 0.64 --tier fast
          cargo run -p xtask --locked -- canary-check --release 0.65
          cargo run -p xtask --locked -- canary-sweep --release 0.65 --tier fast
          cargo run -p xtask --locked -- canary-check --release 0.66
          cargo run -p xtask --locked -- canary-sweep --release 0.66 --tier fast
          cargo run -p xtask --locked -- canary-check --release 0.67
          cargo run -p xtask --locked -- canary-sweep --release 0.67 --tier fast

      - name: Upload fast canary evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: "canary-fast-${{ github.sha }}"
          path: target/release-evidence/canaries/*.json
          if-no-files-found: error

      - name: Fuzz corpus regression
        run: cargo run -p xtask --locked -- evidence-run --release "$HYDRACACHE_CANDIDATE_RELEASE" --gate fast.fuzz-corpus-regression

      - name: Release feature leak
        run: cargo run -p xtask --locked -- verify-no-test-features

      - name: Release governance
        run: cargo run -p xtask --locked -- release-governance-check --release "$HYDRACACHE_CANDIDATE_RELEASE"

      - name: 0.67 performance contract
        run: cargo run -p xtask --locked -- evidence-run --release "$HYDRACACHE_CANDIDATE_RELEASE" --gate fast.performance-contract-067

      - name: SQL lint baseline drift
        run: |
          cargo test -p hydracache-sql-lint --test lint_cli --locked
          cargo run -p hydracache-sql-lint --bin lint --locked -- --check-baseline --baseline lint-baseline.json

      - name: Performance budget contract
        run: |
          cargo test -p xtask --test bench_budget --locked
          cargo run -p xtask --locked -- bench-budget --current benches/baseline/0_37.json

      - name: DST fast budget
        run: cargo test -p hydracache-sim --test dst_budget --locked

      - name: Soak fast budget
        run: cargo test -p hydracache-sim --test soak_budget --locked

      - name: Raft failpoint crash-safety
        run: cargo run -p xtask --locked -- evidence-run --release "$HYDRACACHE_CANDIDATE_RELEASE" --gate fast.raft-failpoints

      - name: Raft compaction control 0.66
        run: |
          cargo test -p hydracache-cluster-raft --test compaction_seam --locked
          cargo run -p xtask --locked -- evidence-run --release "$HYDRACACHE_CANDIDATE_RELEASE" --gate fast.raft-sled-snapshot
          cargo test -p hydracache-server compaction --locked

      - name: 0.66 operational proofs
        run: |
          cargo test -p hydracache-cluster-raft --test membership_load --locked
          cargo test -p hydracache-cluster-raft --test differential_model --locked
          cargo test -p hydracache-cluster-raft --test scheduler_tick --locked
          cargo test -p hydracache-server --test backup_authority_boundary --locked
          cargo test -p hydracache-server --test raft_wire_socket_corpus --locked
          cargo test -p hydracache-server --test rejoin_after_compaction_process --locked
          cargo test -p hydracache-server --test process_control_plane_nemesis --locked
          cargo test -p hydracache-server --test rolling_upgrade_process --locked
          cargo test -p hydracache-server --test external_control_plane_history --locked
          cargo test -p hydracache-server --test differential_model_process --locked
          cargo test -p hydracache-server --test scheduler_tick_process --locked
          cargo test -p hydracache-server --test snapshot_resource_budget --locked
          cargo test -p hydracache-client-transport-axum --test client_surface_conformance --locked local_ttl_and_lock_contracts_survive_backward_wall_clock_step
          cargo test -p hydracache-operator --test soak_kind --locked

      - name: Raft snapshot and transport proof
        run: |
          cargo test -p hydracache-cluster-raft snapshot_immutability --locked
          cargo test -p hydracache-cluster-raft --test raft_snapshot_membership --locked
          cargo test -p hydracache-cluster-raft --features test-failpoints snapshot_apply --locked -- --test-threads=1
          cargo test -p hydracache-cluster-raft snapshot_replay_manifest --locked
          cargo test -p hydracache-server grid_host::tests::http_raft_sink_times_out_when_peer_accepts_without_reply --locked
          cargo test -p hydracache-server grid_host::tests::drive_loop_counts_and_reports_send_failures --locked
          cargo test -p hydracache-server grid_host::tests::raft_drive_continues_after_bounded_peer_send_timeout --locked

      - name: Raft nemesis membership fast
        run: cargo test -p hydracache-cluster-raft --test nemesis_membership --locked

      - name: Raft corpus vectors
        run: cargo test -p hydracache-cluster-raft --test raft_corpus_vectors --locked

      - name: Snapshot corruption
        run: cargo test -p hydracache-cluster-raft --features sled-log-store --test snapshot_corruption --locked

      - name: Raft rejoin after compaction
        run: cargo test -p hydracache-cluster-raft --features test-failpoints --test rejoin_after_compaction --locked -- --test-threads=1

      - name: Raft snapshot resource faults
        run: cargo test -p hydracache-cluster-raft --features test-failpoints --test snapshot_resource_faults --locked -- --test-threads=1

      - name: Snapshot exhaustive grid
        run: cargo test -p hydracache-cluster-raft --test snapshot_exhaustive_grid --locked

      - name: Proposal idempotency
        run: cargo test -p hydracache-cluster-raft --test proposal_idempotency --locked

      - name: Clock skew safety
        run: cargo test -p hydracache-sim --test clock_skew_safety --locked

      - name: Management console
        run: |
          npm --prefix console ci
          npx --prefix console playwright install --with-deps chromium
          npm --prefix console run build
          npm --prefix console test

      - name: Test
        run: cargo run -p xtask --locked -- evidence-run --release "$HYDRACACHE_CANDIDATE_RELEASE" --gate fast.workspace-nextest

      - name: Upload fast release evidence receipt
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: "release-evidence-fast-${{ github.sha }}"
          path: target/release-evidence/receipts/**
          if-no-files-found: error

      - name: Doctests
        run: cargo test --workspace --doc --locked

      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Clean Rust test scratch links
        if: always()
        run: rm -rf target/tests

  performance-budget:
    name: Performance Budget
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.run_nightly)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: performance-budget

      - name: Run criterion benchmarks
        run: |
          cargo bench -p hydracache --bench cache_hot_path --locked
          cargo bench -p hydracache-db --bench outbox_write --locked

      - name: Enforce performance budget
        run: cargo run -p xtask --locked -- bench-budget --current target/criterion

  redis-compat-release-proof:
    name: Redis Compatibility Release Proof
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.run_nightly)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: false

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: redis-compat-release-proof

      - name: Check Docker availability
        run: |
          docker version
          docker info

      - name: Redis fast checks
        run: |
          cargo fmt --all -- --check
          cargo test -p xtask --test doc_check redis_compat --locked -- --nocapture
          cargo test -p hydracache-redis-compat --locked
          cargo test -p hydracache-server --test server_lifecycle redis --locked
          cargo clippy -p hydracache-redis-compat --all-targets --locked -- -D warnings

      - name: Redis Docker/client/oracle matrix
        env:
          HYDRACACHE_RUN_REDIS_COMPAT_CLIENTS: "1"
          HYDRACACHE_REQUIRE_REDIS_ORACLE: "1"
          HYDRACACHE_FORCE_REDIS_CLIENT_DOCKER: "1"
          HYDRACACHE_REQUIRE_REDIS_CLIENT_PYTHON: "1"
          HYDRACACHE_REQUIRE_REDIS_CLIENT_NODE: "1"
          HYDRACACHE_REQUIRE_REDIS_CLIENT_GO: "1"
          HYDRACACHE_REQUIRE_REDIS_CLIENT_JVM: "1"
        run: cargo test -p hydracache-redis-compat --test redis_clients --locked -- --ignored --nocapture

      - name: Redis resource smoke
        env:
          HYDRACACHE_RUN_REDIS_COMPAT_RESOURCE_SMOKE: "1"
        run: cargo test -p hydracache-redis-compat --test resp_resource_smoke --locked -- --ignored --nocapture

  dst-nightly-soak:
    name: DST and Soak Nightly
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.run_nightly)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: dst-nightly-soak

      - name: Run deterministic simulation seeds
        run: |
          cargo run -p hydracache-sim --bin vopr --locked -- --seed 44 --steps 512
          cargo run -p hydracache-sim --bin vopr --locked -- --seed 45 --steps 512
          cargo run -p hydracache-sim --bin vopr --locked -- --seed 46 --steps 512

      - name: Run continuous soak and write SOAK_REPORT
        run: |
          cargo run -p hydracache-sim --bin vopr --locked -- soak --master-seed 22530 --budget-secs 60 --steps-per-seed 512 --max-seeds 128 | tee SOAK_REPORT.json

      - name: Run ignored resource and operator skip sentinels
        run: |
          cargo test -p hydracache-server --test soak_resource --locked -- --ignored --nocapture
          cargo test -p hydracache-operator --test soak_kind --locked -- --ignored --nocapture

      - name: Run networked daemon E2E tier
        env:
          HYDRACACHE_RUN_NETWORKED_DAEMON_E2E: "1"
        run: cargo test -p hydracache-server --test grid_host multi_node --locked -- --nocapture

      - name: Run daemon-process cluster tier
        run: cargo run -p xtask --locked -- evidence-run --release 0.64 --gate env.hydracache-run-daemon-process-e2e

      - name: Redis RESP multinode debt sentinels
        run: cargo run -p xtask --locked -- evidence-run --release 0.65 --gate env.hydracache-run-redis-resp-multinode-e2e

      - name: Upload daemon-process replay artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: daemon-process-replay-artifacts
          path: target/test-hydracache-daemon-process/**
          if-no-files-found: ignore

      - name: Upload daemon-process evidence receipt
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: "daemon-process-evidence-${{ github.sha }}"
          path: target/release-evidence/receipts/**
          if-no-files-found: error

      - name: Run membership-history tier
        env:
          HYDRACACHE_RUN_DAEMON_PROCESS_E2E: "1"
        run: cargo test -p hydracache-server --test membership_history --locked -- --nocapture

      - name: Run pre-vote nightly soak
        env:
          HYDRACACHE_RUN_PREVOTE_NIGHTLY_SOAK: "1"
        run: cargo test -p hydracache-cluster-raft --test prevote_nightly_soak --locked -- --nocapture

      - name: Run raft nemesis nightly soak
        env:
          HYDRACACHE_RUN_RAFT_NEMESIS_SOAK: "1"
          HYDRACACHE_NEMESIS_BUDGET_SECS: "60"
        run: cargo test -p hydracache-cluster-raft --test nemesis_membership nemesis_soak_over_seed_range_converges --locked -- --nocapture

      - name: Upload SOAK_REPORT
        uses: actions/upload-artifact@v6
        with:
          name: SOAK_REPORT
          path: SOAK_REPORT.json

  raft-corner-case-nightly:
    name: Raft Corner-Case Nightly
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.run_nightly)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: raft-corner-case-nightly

      - name: Raft nemesis soak
        run: cargo run -p xtask --locked -- evidence-run --release 0.64 --gate env.hydracache-run-raft-nemesis-soak

      - name: Snapshot exhaustive grid wide
        run: cargo run -p xtask --locked -- evidence-run --release 0.64 --gate env.hydracache-grid-scope

      - name: Rejoin after compaction proof
        run: cargo run -p xtask --locked -- evidence-run --release 0.64 --gate cfg.hydracache-cluster-raft.rejoin-after-compaction

      - name: Snapshot resource faults
        run: cargo run -p xtask --locked -- evidence-run --release 0.64 --gate cfg.hydracache-cluster-raft.snapshot-resource-faults

      - name: W39c Raft cancellation safety
        run: cargo run -p xtask --locked -- evidence-run --release 0.64 --gate env.hydracache-run-cancellation-raft

      - name: Clock skew safety
        run: cargo test -p hydracache-sim --test clock_skew_safety --locked -- --nocapture

      - name: Upload raft corner-case artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: raft-corner-case-artifacts
          path: |
            target/hydracache-contradiction-ledger/**
            target/hydracache-daemon-logs/**
            target/test-hydracache-daemon-process/**
            target/release-evidence/receipts/**
          if-no-files-found: ignore

  release-066-daemon-process:
    name: 0.66 Daemon Process Release Proof
    runs-on: ubuntu-latest
    timeout-minutes: 130
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.run_nightly)

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2-rust-with-target
          cache-targets: true
          shared-key: release-066-daemon-process

      - name: Verify shipped 0.65 provenance
        run: |
          git rev-parse --verify refs/tags/v0.65.0
          git merge-base --is-ancestor refs/tags/v0.65.0 HEAD

      - name: Run 0.66 daemon-process release proof
        run: cargo run -p xtask --locked -- evidence-run --release 0.66 --gate env.hydracache-run-066-daemon-process-e2e

      - name: Upload 0.66 daemon-process evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: "daemon-process-066-${{ github.sha }}"
          path: |
            target/test-hydracache-daemon-process/**
            target/test-evidence/0.66/**
            target/release-evidence/receipts/**
          if-no-files-found: error

  release-066-operator-kind:
    name: 0.66 Operator Kind Release Proof
    runs-on: ubuntu-latest
    timeout-minutes: 130
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.run_nightly)

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23.4"
          cache: false

      - name: Install kubectl
        uses: azure/setup-kubectl@v5.1.0
        with:
          version: v1.32.0

      - name: Install Helm
        uses: azure/setup-helm@v4.3.1
        with:
          version: v3.17.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v2-rust-with-target
          cache-targets: true
          shared-key: release-066-operator-kind

      - name: Create kind cluster with enforcing CNI
        shell: bash
        run: |
          go install sigs.k8s.io/kind@v0.26.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          "$(go env GOPATH)/bin/kind" create cluster \
            --name hydracache-066 \
            --image kindest/node:v1.32.0@sha256:c48c62eac5da28cdadcf560d1d8616cfa6783b58f0d94cf63ad1bf49600cb027 \
            --config - <<'EOF'
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          networking:
            disableDefaultCNI: true
          nodes:
            - role: control-plane
            - role: worker
            - role: worker
          EOF
          kubectl apply -f https://raw.githubusercontent.com/projectcalico/calico/v3.29.2/manifests/calico.yaml
          kubectl rollout status deployment/calico-kube-controllers -n kube-system --timeout=5m
          kubectl rollout status daemonset/calico-node -n kube-system --timeout=5m

      - name: Install required Chaos Mesh IOChaos runtime
        run: |
          helm repo add chaos-mesh https://charts.chaos-mesh.org
          helm repo update
          helm install chaos-mesh chaos-mesh/chaos-mesh \
            --namespace chaos-mesh \
            --create-namespace \
            --version 2.7.2 \
            --set chaosDaemon.runtime=containerd \
            --set chaosDaemon.socketPath=/run/containerd/containerd.sock \
            --wait \
            --timeout 10m
          kubectl get crd iochaos.chaos-mesh.org

      - name: Build and load current server image
        run: |
          docker build --tag hydracache-server:0.66-candidate .
          kind load docker-image --name hydracache-066 hydracache-server:0.66-candidate

      - name: Prepare current operator controller
        shell: bash
        run: |
          mkdir -p target/test-evidence/0.66
          kubectl apply -f deploy/operator/hydracacheclusters.hydracache.io.crd.yaml
          kubectl auth can-i get pods --subresource=proxy --namespace default
          kubectl auth can-i create pods --subresource=proxy --namespace default
          cargo build -p hydracache-operator --locked
          operator_candidate_directory="$(pwd)/target/ci-runtime/0.66"
          operator_binary="$operator_candidate_directory/hydracache-operator-${GITHUB_SHA}"
          mkdir -p "$operator_candidate_directory"
          install -m 0755 "$(pwd)/target/debug/hydracache-operator" "$operator_binary"
          operator_log="target/test-evidence/0.66/operator-controller-live.log"
          operator_nonce="release-066-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${GITHUB_SHA}"
          export HYDRACACHE_OPERATOR_EVIDENCE_NONCE="$operator_nonce"
          echo "HYDRACACHE_OPERATOR_EVIDENCE_NONCE=$operator_nonce" >> "$GITHUB_ENV"
          echo "HYDRACACHE_OPERATOR_BINARY=$operator_binary" >> "$GITHUB_ENV"
          printf 'HC-OPERATOR-CONTROLLER-START nonce=%s binary=%s\n' \
            "$operator_nonce" "$operator_binary" > "$operator_log"

      - name: Start current operator controller
        id: operator-controller
        shell: bash
        background: true
        env:
          HYDRACACHE_OPERATOR_NAMESPACE: default
          HYDRACACHE_OPERATOR_IDENTITY: release-066-ci
        run: |
          operator_log="target/test-evidence/0.66/operator-controller-live.log"
          operator_pid_file="target/test-evidence/0.66/operator-controller.pid"
          printf '%s\n' "$BASHPID" > "$operator_pid_file"
          exec "$HYDRACACHE_OPERATOR_BINARY" >> "$operator_log" 2>&1

      - name: Verify current operator controller
        shell: bash
        run: |
          operator_log="target/test-evidence/0.66/operator-controller-live.log"
          operator_pid_file="target/test-evidence/0.66/operator-controller.pid"
          operator_nonce="$HYDRACACHE_OPERATOR_EVIDENCE_NONCE"
          operator_ready=0
          for _ in $(seq 1 30); do
            if [[ -s "$operator_pid_file" ]]; then
              operator_pid="$(cat "$operator_pid_file")"
            else
              sleep 1
              continue
            fi
            if kill -0 "$operator_pid" \
              && grep -Fq "HC-OPERATOR-CONTROLLER-RUNTIME nonce=$operator_nonce " "$operator_log"; then
              operator_ready=1
              break
            fi
            sleep 1
          done
          kill -0 "$operator_pid"
          test "$operator_ready" = 1
          grep -F "HC-OPERATOR-CONTROLLER-RUNTIME nonce=$operator_nonce " "$operator_log"

      - name: Run 0.66 operator-kind release proof
        run: cargo run -p xtask --locked -- evidence-run --release 0.66 --gate env.hydracache-operator-kind-066

      - name: Stop current operator controller
        cancel: operator-controller

      - name: Capture operator-kind diagnostics
        if: always()
        continue-on-error: true
        run: |
          kubectl get pods,statefulsets,services,hydracacheclusters -A -o wide > target/test-evidence/0.66/operator-kind-resources-post.txt || true
          kubectl get events -A --sort-by=.lastTimestamp > target/test-evidence/0.66/operator-kind-events-post.txt || true
          kubectl logs -n default \
            --selector 'app.kubernetes.io/name=hydracache,app.kubernetes.io/instance=hydracache-066,app.kubernetes.io/component=server' \
            --all-containers=true \
            --prefix=true \
            --tail=-1 \
            > target/test-evidence/0.66/operator-kind-pod-logs-post.txt || true

      - name: Upload 0.66 operator-kind evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: "operator-kind-066-${{ github.sha }}"
          path: |
            target/test-evidence/0.66/**
            target/release-evidence/receipts/**
          if-no-files-found: error

  performance-067-shared-tripwire:
    name: 0.67 Shared Performance Tripwire
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')) || github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.run_nightly && !inputs.run_reference_performance && inputs.candidate_release == '0.67')

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pinned Rust 1.94.0
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Validate shared-runner tripwire policy
        run: cargo test -p xtask --test perf_budget_067 --locked ci_shared_is_a_rolling_only_non_enforcing_tripwire

      - name: Evaluate non-ship shared-runner tripwire
        run: cargo run -p xtask --locked -- perf-budget-check --release 0.67 --profile ci-shared

      - name: Upload 0.67 shared tripwire
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: "performance-shared-tripwire-067-${{ github.sha }}"
          path: target/test-evidence/0.67/perf-budget-verdict.json
          if-no-files-found: error

  release-067-performance:
    name: 0.67 GitHub-hosted Reference Evidence
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    if: github.event_name == 'workflow_dispatch' && inputs.run_reference_performance && inputs.candidate_release == '0.67'
    concurrency:
      group: release-067-performance-reference-v1
      cancel-in-progress: false
    env:
      HYDRACACHE_RUN_PERF_REFERENCE: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install pinned Rust 1.94.0
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Verify shipped 0.66 provenance
        run: |
          git rev-parse --verify refs/tags/v0.66.0
          git merge-base --is-ancestor refs/tags/v0.66.0 HEAD

      - name: Run 0.67 canary sweep
        run: cargo run -p xtask --locked -- canary-sweep --release 0.67 --tier all

      - name: Validate 0.67 performance contract
        run: cargo run -p xtask --locked -- evidence-run --release 0.67 --gate fast.performance-contract-067

      - name: Prebuild 0.67 performance binaries
        run: cargo run -p xtask --locked -- evidence-run --release 0.67 --gate tool.perf-prebuild-067

      - name: Run 0.67 core performance evidence
        run: cargo run -p xtask --locked -- evidence-run --release 0.67 --gate env.hydracache-run-067-perf-core

      - name: Run 0.67 RESP performance evidence
        run: cargo run -p xtask --locked -- evidence-run --release 0.67 --gate env.hydracache-run-067-perf-resp

      - name: Run 0.67 control-plane performance evidence
        run: cargo run -p xtask --locked -- evidence-run --release 0.67 --gate env.hydracache-run-067-perf-control-plane

      - name: Check 0.67 performance budgets
        run: cargo run -p xtask --locked -- evidence-run --release 0.67 --gate tool.perf-budget-check-067

      - name: Aggregate exact 0.67 candidate evidence
        run: cargo run -p xtask --locked -- release-evidence --release 0.67 --receipts-dir target/release-evidence/receipts --require-ship

      - name: Upload 0.67 performance evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: "performance-067-${{ github.sha }}"
          path: |
            target/test-evidence/0.67/**
            target/release-evidence/canaries/0.67-*.json
            target/release-evidence/receipts/**
          if-no-files-found: error

  raft-loom:
    name: Raft Loom
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.run_nightly)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: raft-loom

      - name: Run loom concurrency checks
        env:
          RUSTFLAGS: --cfg hydracache_loom
        run: cargo test -p hydracache-cluster-raft --test loom_concurrency --locked -- --nocapture

  fuzz-nightly:
    name: Fuzz Nightly
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.run_nightly)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: fuzz-nightly

      - name: Install nightly and cargo-fuzz
        run: |
          rustup toolchain install nightly
          cargo install cargo-fuzz --version 0.13.2 --locked

      - name: Run time-boxed fuzz targets
        working-directory: fuzz
        run: |
          cargo +nightly fuzz run fuzz_config_parse -- -max_total_time=60
          cargo +nightly fuzz run fuzz_kv_codec -- -max_total_time=60
          cargo +nightly fuzz run fuzz_resp_command -- -max_total_time=60
          cargo +nightly fuzz run fuzz_snapshot_decode -- -max_total_time=60

      - name: Run 0.66 Raft wire fuzz release proof
        run: cargo run -p xtask --locked -- evidence-run --release 0.66 --gate tool.cargo-fuzz.raft-wire-frame-066

      - name: Upload 0.66 fuzz evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: "raft-wire-fuzz-066-${{ github.sha }}"
          path: |
            fuzz/artifacts/raft_wire_frame/**
            fuzz/corpus/raft_wire_frame/**
            target/release-evidence/receipts/**
          if-no-files-found: error

  raft-mutation-testing:
    name: Raft Mutation Testing (${{ matrix.label }})
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.run_nightly)
    timeout-minutes: 110
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        include:
          - label: product-0-of-8
            campaign: product
            gate: env.hydracache-run-raft-mutants-shard-0-of-8
          - label: product-1-of-8
            campaign: product
            gate: env.hydracache-run-raft-mutants-shard-1-of-8
          - label: product-2-of-8
            campaign: product
            gate: env.hydracache-run-raft-mutants-shard-2-of-8
          - label: product-3-of-8
            campaign: product
            gate: env.hydracache-run-raft-mutants-shard-3-of-8
          - label: product-4-of-8
            campaign: product
            gate: env.hydracache-run-raft-mutants-shard-4-of-8
          - label: product-5-of-8
            campaign: product
            gate: env.hydracache-run-raft-mutants-shard-5-of-8
          - label: product-6-of-8
            campaign: product
            gate: env.hydracache-run-raft-mutants-shard-6-of-8
          - label: product-7-of-8
            campaign: product
            gate: env.hydracache-run-raft-mutants-shard-7-of-8
          - label: proof-oracles-0-of-2
            campaign: proof-oracles
            gate: env.hydracache-run-proof-oracle-mutants-shard-0-of-2
          - label: proof-oracles-1-of-2
            campaign: proof-oracles
            gate: env.hydracache-run-proof-oracle-mutants-shard-1-of-2

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: raft-mutation-testing-${{ matrix.campaign }}

      - name: Install cargo-mutants
        run: cargo install cargo-mutants --version 27.1.0 --locked

      - name: Run registered mutation shard
        run: |
          cargo test -p xtask --test mutants --locked
          cargo run -p xtask --locked -- evidence-run --release 0.64 --gate ${{ matrix.gate }}

      - name: Upload mutation artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: "raft-mutation-testing-${{ matrix.label }}-${{ github.sha }}"
          path: |
            target/hydracache-mutants/**
            target/hydracache-mutants-proof-oracles/**
            target/release-evidence/receipts/**
          if-no-files-found: ignore

  raft-miri:
    name: Raft Miri
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.run_nightly)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install nightly Miri
        id: miri
        shell: bash
        run: |
          set +e
          rustup toolchain install nightly-2026-07-01 --component miri
          status=$?
          if [ "$status" -ne 0 ]; then
            echo "::warning::nightly+miri toolchain unavailable; skipping Raft Miri lane"
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          cargo +nightly-2026-07-01 miri setup
          setup_status=$?
          if [ "$setup_status" -ne 0 ]; then
            echo "::warning::cargo miri setup failed; skipping Raft Miri lane"
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Cache Rust dependencies
        if: steps.miri.outputs.available == 'true'
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: raft-miri

      - name: Run commit-bound Miri snapshot proofs
        if: steps.miri.outputs.available == 'true'
        run: cargo run -p xtask --locked -- evidence-run --release 0.64 --gate tool.miri.snapshot-safety

      - name: Upload Miri evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: "raft-miri-${{ github.sha }}"
          path: |
            target/test-evidence/0.64/miri-snapshot-safety.json
            target/release-evidence/receipts/**
          if-no-files-found: warn

  thread-sanitizer:
    name: ThreadSanitizer
    runs-on: ubuntu-latest
    timeout-minutes: 180
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.run_nightly)

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pinned nightly with rust-src
        run: rustup toolchain install nightly-2026-07-01 --component rust-src

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: thread-sanitizer-nightly-2026-07-01

      - name: Prebuild TSan proof targets
        timeout-minutes: 120
        env:
          RUSTFLAGS: -Zsanitizer=thread
          RUSTDOCFLAGS: -Zsanitizer=thread
        run: cargo +nightly-2026-07-01 test -Zbuild-std --target x86_64-unknown-linux-gnu --locked --no-run -p hydracache -p hydracache-cluster-raft --test cache_core_concurrency_matrix --test leadership_handoff --test snapshot_delivery_chaos --test tsan_canary

      - name: Run ordinary threaded suites under TSan
        run: cargo run -p xtask --locked -- evidence-run --release 0.64 --gate tool.tsan.concurrent-suites

      - name: Prove TSan detects the isolated race canary
        run: cargo run -p xtask --locked -- evidence-run --release 0.64 --gate tool.tsan.race-canary

      - name: Upload TSan evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: "thread-sanitizer-${{ github.sha }}"
          path: |
            target/test-evidence/0.64/tsan-*.json
            target/release-evidence/receipts/**
          if-no-files-found: error

  dynamic-canary-sweep:
    name: Dynamic Canary Sweep
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.run_nightly)

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install pinned TSan nightly
        run: rustup toolchain install nightly-2026-07-01 --component rust-src

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: dynamic-canary-sweep

      - name: Download and verify pinned TLC
        shell: bash
        run: |
          mkdir -p target/tools/tla2tools/1.7.4
          curl --fail --location --silent --show-error \
            https://github.com/tlaplus/tlaplus/releases/download/v1.7.4/tla2tools.jar \
            --output target/tools/tla2tools/1.7.4/tla2tools.jar
          echo "936a262061c914694dfd669a543be24573c45d5aa0ff20a8b96b23d01e050e88  target/tools/tla2tools/1.7.4/tla2tools.jar" | sha256sum --check

      - name: Execute complete dynamic expected-red sweep
        run: |
          cargo run -p xtask --locked -- canary-sweep --release 0.64 --tier all
          cargo run -p xtask --locked -- canary-sweep --release 0.65 --tier all
          cargo run -p xtask --locked -- canary-sweep --release 0.66 --tier all
          cargo run -p xtask --locked -- canary-sweep --release 0.67 --tier all

      - name: Run deterministic suite sweep
        run: cargo run -p xtask --locked -- evidence-run --release 0.64 --gate tool.determinism-sweep

      - name: Upload complete canary evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: "canary-all-${{ github.sha }}"
          path: |
            target/release-evidence/canaries/*.json
            target/release-evidence/receipts/**
            target/test-evidence/0.64/determinism-sweep.json
            target/test-evidence/0.64/raft-spec-canary.json
          if-no-files-found: error

  coverage-ratchet:
    name: Coverage Ratchet
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.run_nightly)
    env:
      HYDRACACHE_TEST_POSTGRES_URL: postgres://hydracache:hydracache@127.0.0.1:5432/hydracache
    services:
      postgres:
        image: postgres:16.4-alpine
        env:
          POSTGRES_DB: hydracache
          POSTGRES_PASSWORD: hydracache
          POSTGRES_USER: hydracache
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hydracache -d hydracache"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: coverage-ratchet

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov@0.8.7

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Run commit-bound coverage ratchet
        run: cargo run -p xtask --locked -- evidence-run --release 0.64 --gate tool.coverage-ratchet

      - name: Generate coverage artifacts on failure
        if: failure()
        continue-on-error: true
        run: |
          cargo llvm-cov report --ignore-filename-regex '(^|/)crates/(xtask|hydracache-loadgen)/' --html --output-dir target/llvm-cov-html
          cargo llvm-cov report --ignore-filename-regex '(^|/)crates/(xtask|hydracache-loadgen)/' --lcov --output-path target/llvm-cov.lcov

      - name: Upload coverage evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: "coverage-ratchet-${{ github.sha }}"
          path: |
            target/llvm-cov-html
            target/llvm-cov.lcov
            target/test-evidence/0.64/coverage-*.json
            target/release-evidence/receipts/**
          if-no-files-found: error

      - name: Clean Rust test scratch links
        if: always()
        run: rm -rf target/tests

  msrv:
    name: MSRV 1.88.0
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust 1.88.0
        uses: dtolnay/rust-toolchain@1.88.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: msrv-1.88.0

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Check MSRV
        run: cargo check --workspace --all-targets --locked

      - name: Test MSRV
        run: cargo test --workspace --locked

      - name: Clean Rust test scratch links
        if: always()
        run: rm -rf target/tests

  gated-proof-registry:
    name: Registered Gated Proof
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.gated_gate_id != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust-no-target
          cache-targets: false
          shared-key: registered-gated-proof

      - name: Install Java for pinned TLA+ proof
        if: startsWith(inputs.gated_gate_id, 'tool.tla-tlc.')
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Prepare pinned TLA+ tools
        if: startsWith(inputs.gated_gate_id, 'tool.tla-tlc.')
        shell: bash
        run: |
          mkdir -p target/tools/tla2tools/1.7.4
          curl --fail --location --retry 3 \
            --output target/tools/tla2tools/1.7.4/tla2tools.jar \
            https://github.com/tlaplus/tlaplus/releases/download/v1.7.4/tla2tools.jar
          echo "936a262061c914694dfd669a543be24573c45d5aa0ff20a8b96b23d01e050e88  target/tools/tla2tools/1.7.4/tla2tools.jar" | sha256sum --check

      - name: Install pinned cargo-mutants
        if: contains(inputs.gated_gate_id, 'mutants')
        run: cargo install cargo-mutants --version 27.1.0 --locked

      - name: Install pinned ThreadSanitizer toolchain
        if: startsWith(inputs.gated_gate_id, 'tool.tsan.')
        run: rustup toolchain install nightly-2026-07-01 --component rust-src

      - name: Run registered gated proofs
        run: cargo run -p xtask --locked -- evidence-run --release "$HYDRACACHE_CANDIDATE_RELEASE" --gate "${{ inputs.gated_gate_id }}"

      - name: Upload registered gated proof receipt
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: "release-evidence-${{ github.sha }}-${{ inputs.gated_gate_id }}"
          path: target/release-evidence/receipts
          if-no-files-found: error
